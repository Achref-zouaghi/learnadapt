
services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - uploads:/var/www/html/public/uploads
      - var_data:/var/www/html/var
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: mysql://learnadapt:${DB_PASSWORD:-secret}@host.docker.internal:3306/learnadapt?serverVersion=10.4.32-MariaDB&charset=utf8mb4
      MAILER_DSN: ${MAILER_DSN:-null://null}
      MAILER_FROM: ${MAILER_FROM:-noreply@learnadapt.local}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      REGISTER_INVITE_CODE: ${REGISTER_INVITE_CODE:-}
      SERVER_GATE_PASSWORD: ${SERVER_GATE_PASSWORD:-}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/var/www/html/public:ro
      - uploads:/var/www/html/public/uploads:ro
    depends_on:
      - app

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PMA_HOST: host.docker.internal
      PMA_PORT: 3306
      PMA_USER: learnadapt
      PMA_PASSWORD: ${DB_PASSWORD:-secret}

  cloudflare:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx

volumes:
  uploads:
  var_data:
