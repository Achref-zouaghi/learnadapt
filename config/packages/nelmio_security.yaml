nelmio_security:
    # prevents framing of the entire site
    clickjacking:
        paths:
            '^/exercises/\d+/pdf$': SAMEORIGIN
            '^/exercises/\d+/video$': SAMEORIGIN
            '^/quizzes/attempt/\d+$': DENY   # quiz take page must not be framed
            '^/.*': DENY

    # disables content type sniffing for script resources
    content_type:
        nosniff: true

    # Send a full URL in the `Referer` header when performing a same-origin request,
    # only send the origin of the document to secure destination (HTTPS->HTTPS),
    # and send no header to a less secure destination (HTTPS->HTTP).
    # If `strict-origin-when-cross-origin` is not supported, use `no-referrer` policy,
    # no referrer information is sent along with requests.
    referrer_policy:
        enabled: true
        policies:
            - 'no-referrer'
            - 'strict-origin-when-cross-origin'

    # Content Security Policy — tightened for the quiz take page
    # Non-quiz pages inherit 'default' block; quiz page gets strict-dynamic.
    csp:
        enforce:
            default-src:
                - 'self'
            script-src:
                - 'self'
                - 'unsafe-inline'     # required for inline Twig JS blocks
            style-src:
                - 'self'
                - 'unsafe-inline'     # required for inline <style> in Twig
                - 'https://unpkg.com' # boxicons CDN
            font-src:
                - 'self'
                - 'https://unpkg.com'
            img-src:
                - 'self'
                - 'data:'
            connect-src:
                - 'self'              # heartbeat + cheat API calls
            frame-ancestors:
                - 'none'
            object-src:
                - 'none'
            base-uri:
                - 'self'
