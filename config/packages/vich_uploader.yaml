vich_uploader:
    db_driver: orm
    mappings:
        exercise_file:
            uri_prefix: /uploads/exercises
            upload_destination: '%kernel.project_dir%/public/uploads/exercises'
            namer: Vich\UploaderBundle\Naming\UniqidNamer
            inject_on_load: true
            delete_on_update: true
            delete_on_remove: true
